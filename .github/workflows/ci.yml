name: CI

on:
  push:
  pull_request:

jobs:
  default:
    name: Default suite (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pcntl, posix, shmop
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Code style
        run: composer cs-check

      - name: Default suite (base + working)
        run: composer test

  container:
    name: Container suite (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Build test image (pcntl/posix/shmop/swoole)
        run: docker build -f tests/docker/Dockerfile --build-arg PHP_VERSION=${{ matrix.php }} -t wt-test:${{ matrix.php }} .

      - name: Run default + container suites
        run: |
          docker run --rm -v "$PWD":/app -w /app wt-test:${{ matrix.php }} bash -lc '
            composer install --no-interaction --no-progress
            composer test
            vendor/bin/phpunit --testsuite container
          '
